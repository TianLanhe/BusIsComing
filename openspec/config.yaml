schema: spec-driven

context: |
  專案背景：
  BusIsComing 是面向香港巴士通勤場景的 Android App，以常用起終點快速查詢為核心。
  用戶可管理常用路線、進行臨時查詢、比較 Citybus 點到點候選路線、查看票價／耗時／步行距離／首程 ETA／路線詳情，
  並可啟動短時通知欄監控。生產路徑必須使用真實 Citybus 與 DATA.GOV.HK 資料；fixture 僅用於測試和回歸。

  技術棧：
  - Kotlin，XML + AppCompat + Material Components。
  - RecyclerView + SwipeRefreshLayout；SQLiteOpenHelper。
  - jsoup 解析 Citybus HTML，輕量 JSON 欄位解析公開 ETA。
  - Foreground Service + NotificationCompat + AlarmManager + TextToSpeech。
  - 輕量 Repository 分層；Gradle Kotlin DSL；JUnit、AndroidX Test、Espresso。
  - Android Gradle Plugin 9.2.1，compileSdk 36.1，minSdk 25，targetSdk 36，Java 11。
  - 工程未顯式應用 `org.jetbrains.kotlin.android` 仍可建立 Kotlin 編譯任務；調整 Kotlin 配置前須先驗證，避免 `kotlin` 擴展衝突。

  核心架構與接口風格：
  - UI 層負責展示、輸入和生命週期協調；不得散落 SQLite、HTTP、HTML／JSON 解析或長流程業務邏輯。
  - repository 層封裝本機資料、Citybus 查詢、解析、站點對齊、路線詳情與 ETA 編排；model／service 層封裝領域狀態和背景能力。
  - 內部接口以 Kotlin interface、資料模型及 callback 為主；路線查詢先返回基礎結果，再以 callback 漸進補齊 ETA 和站點預覽。
  - 網路接口為 HTTPS GET：Citybus mobile 返回 HTML，DATA.GOV.HK ETA 返回 JSON；外部格式假設集中在 parser／repository。
  - 耗時工作不得阻塞主線程；並發刷新和背景任務須處理取消、generation 過期、部分失敗及 Android 生命週期限制。

  外部資料與典型流程：
  - `ppsearch_p3.php`：點到點候選路線；查詢關鍵參數包含起終點座標、香港時間、`ws=1.3`、`leg=2`、`m1`、`l=0`。
  - 查詢會聚合不同 `m1` 模式結果；修改去重、排序或參數時須保留可復現的等價 cURL 和回歸樣例。
  - `showstops2.php`：依 P2P rawInfo 對齊 route variant、停站和 stop id，避免公開路線站序與 P2P 結果不一致。
  - `getp2pstopinroute.php`：取得上下車站、途經站點和換乘段。
  - `rt.data.gov.hk/v2/transport/citybus/eta/...`：取得首程即時 ETA。
  - 典型流程：`MainActivity -> CitybusBusRouteRepository -> ppsearch_p3.php -> CitybusRouteParser`
    先展示基礎結果，再於背景補齊 `showstops2`／ETA／站點預覽並增量刷新 RecyclerView。

  精簡目錄結構：
  ```text
  BusIsComming/
  ├── app/                         Android App 模組
  │   └── src/
  │       ├── main/
  │       │   ├── java/.../
  │       │   │   ├── data/local          SQLite schema 與資料庫 helper
  │       │   │   ├── data/model          路線、地點、ETA、排序、監控等領域模型
  │       │   │   ├── data/repository     HTTP、解析、查詢編排、詳情與本機資料存取
  │       │   │   ├── service             前台監控、調度、通知、TTS、session 持久化
  │       │   │   └── ui                  main／edit／manage／common 畫面與共用 UI
  │       │   ├── res/                    XML 佈局、字串、主題、drawable 與圖示
  │       │   └── AndroidManifest.xml     Activity、Service、權限及 App 宣告
  │       ├── test/                        JVM 單元測試與 Citybus HTML fixture
  │       └── androidTest/                 裝置／模擬器 instrumentation 測試
  ├── docs/                        產品設計、資料推導、實作說明與 UI 風格指南
  ├── gradle/                      wrapper 與 version catalog
  ├── openspec/
  │   ├── config.yaml              OpenSpec 專案上下文和工件規則
  │   ├── specs/                   已歸檔並生效的能力規格
  │   └── changes/                 進行中及 archive/ 已完成的變更工件
  ├── README.md                    功能、架構、資料來源和開發入口
  ├── AGENTS.md                    專案級長期規則
  ├── build.gradle.kts             根專案構建配置
  └── settings.gradle.kts          模組、插件和倉庫配置
  ```

  專案知識與長期規則：
  - 需求與行為來源依序參考相關 `openspec/specs/`、當前 change、測試、`docs/`、`README.md` 和實際代碼；衝突時須指出並在工件中明確裁決。
  - 人類可讀的 OpenSpec、文件、App 文案和測試期望使用繁體中文；解析器要求的英文標記、代碼符號、外部 API 原文和 fixture 保持原樣。
  - 需求未明確時，先確認行為、UI、資料來源、錯誤處理和驗證方式，再建立 change；用戶要求「新開 change」時不得合併到既有 change。
  - 修改外部 API、解析器、站點對齊或 ETA 邏輯時，先區分原始回應與 App 解析／展示，並保留 cURL、fixture、日誌或針對性測試。
  - UI 改動遵循 `docs/ui-style-guide.md`，檢查文字截斷、間距、觸控目標、無障礙、WindowInsets、字體縮放和不同螢幕尺寸。
  - 保護既有本機資料和用戶可控性；通知、背景服務或權限變更須提供清楚的停止、失敗和恢復路徑。
  - 保持改動窄而可審查，不做無關重構，不任意改動既有資料格式、排序、文案或外部樣例。
  - 實作完成後優先運行 `./gradlew build`；窄改動可先跑相關測試或 `./gradlew testDebugUnitTest`。
  - UI、通知或背景服務變更應在模擬器／實機驗證；無設備時須明確記錄未完成的手動驗證。
  - 每次 `/opsx-apply` 或 `/opsx:apply` 完成實作和驗證後自動 git commit；提交前檢查工作區和 staged 範圍，
    如存在明顯無關改動或提交範圍不清晰則先確認。提交訊息使用簡潔英文 conventional commit，且不提交構建產物。

rules:
  proposal:
    - '使用繁體中文撰寫；代碼符號、能力 ID、外部接口名稱及 OpenSpec 固定標題保持原樣。'
    - '說明使用者或系統目前遇到的具體問題、為何現在需要改動，以及成功後可觀察到的結果；避免只描述實作方案。'
    - '保持 `Why`、`What Changes`、`Capabilities`、`Impact` 結構完整；內容應精簡、可審核，不重複 design 的底層細節。'
    - '在 `Capabilities` 中明確區分 New Capabilities 與 Modified Capabilities；能力 ID 使用 kebab-case，並與 `specs/<capability>/spec.md` 一致。'
    - '明確列出範圍與非目標，避免把無關重構、文案調整、資料格式變更或既有排序行為帶入 change。'
    - '`Impact` 必須指出受影響的模組／目錄、既有規格、外部資料源、相容性、測試和人工驗證需求。'
    - '涉及 Citybus／DATA.GOV.HK 時，寫明接口、參數或返回格式假設，以及需要保留的 cURL、fixture、日誌或回歸案例。'
    - '涉及 UI、通知或背景能力時，寫明生命週期、錯誤／恢復路徑、用戶可控性、無障礙和模擬器驗收影響。'
    - '需求尚有多種合理解釋時不得直接定案；先完成需求澄清。用戶要求新 change 時，即使與現有規格重疊也建立獨立 change。'
    - '審核時確認提案與現行 `openspec/specs/`、代碼和測試一致；若不一致，必須明確說明要修改的既有能力。'

  specs:
    - '使用繁體中文撰寫人類可讀內容；保留 `## ADDED Requirements`、`## MODIFIED Requirements`、`## REMOVED Requirements`、`### Requirement:`、`#### Scenario:` 等解析標記。'
    - '每個 requirement 表達單一、可驗收的能力，使用 SHALL／SHALL NOT 描述規範性行為，不使用「應該」「可能」等模糊措辭。'
    - '每個 requirement 至少包含一個 scenario；scenario 使用 `- **WHEN**`、`- **THEN**`、`- **AND**` 描述前置條件、操作和可觀察結果。'
    - '規格描述外部可觀察行為與契約，不把類名、私有函式或臨時實作步驟當成需求；必要的接口參數、資料格式和相容性約束除外。'
    - 'Modified requirement 必須提供修改後的完整 requirement 和完整 scenarios，不只記錄差異片段；Removed requirement 必須交代移除理由和遷移影響。'
    - '覆蓋正常、空資料、部分資料、失敗、重試／取消、並發／過期結果及生命週期邊界中與本 change 有關的情境。'
    - '涉及本機資料、通知、權限或背景服務時，規定資料保護、停止、恢復和降級行為；涉及 UI 時規定可見狀態、操作可用性和無障礙結果。'
    - '涉及 Citybus／ETA 時，區分原始上游回應、解析結果和 UI 展示；不得用 fixture 行為替代生產 HTTP 契約。'
    - '外部 API 原文、fixture 和第三方規格保持原始文字；新增的規格說明、場景名稱和 App 文案使用繁體中文。'
    - '審核時逐項確認 scenario 可由自動化測試或明確人工步驟驗證，且不與其他生效規格互相矛盾。'

  design:
    - '使用繁體中文撰寫；保持 `Context`、`Goals / Non-Goals`、`Decisions`、`Risks / Trade-offs` 等既有結構，按需要補充 Migration Plan 或 Open Questions。'
    - '基於實際代碼路徑、類別、接口和資料流描述現況，不假設不存在的框架、模組或後端服務。'
    - '每個核心決策須說明選擇、原因、受影響邊界及至少一個被否決的替代方案；避免只列最終做法。'
    - '維持 UI、repository、model／service 分層；不得把 SQLite、HTTP、解析或長流程業務邏輯新增到 Activity、Adapter 或 Fragment。'
    - '描述資料流、線程／並發模型、取消和 generation 過期處理、生命週期、錯誤／降級、快取／持久化及相容性中與變更相關的部分。'
    - '外部接口變更須記錄 URL／參數／header／HTML 或 JSON 假設、route variant／stop id 對齊策略及可復現證據。'
    - 'UI 設計須遵循 `docs/ui-style-guide.md` 和既有 XML + Material 元件，說明載入、空、成功、失敗狀態及無障礙／多尺寸驗證。'
    - '優先沿用既有 repository、service、formatter、policy 和測試注入點；新增抽象必須有清楚責任和實際需要，不做超出 change 的架構重寫。'
    - '測試策略須對應 specs scenarios，區分純邏輯單測、parser／fixture 回歸、instrumentation 及模擬器／實機驗證。'
    - '審核時檢查 proposal、specs、design 三者範圍一致，所有風險均有具體緩解措施，且不存在未裁決的關鍵行為。'

  tasks:
    - '使用繁體中文撰寫；採用分組編號和 `- [ ]` checklist，任務完成後更新為 `- [x]`，不得保留與實際狀態不符的勾選。'
    - '任務按依賴順序拆分為可獨立實作和驗證的小步驟，通常依序包含模型／契約、repository／service、UI、測試、文件與最終驗證。'
    - '每個任務描述具體產出、主要檔案或模組和完成條件；避免「完成開發」「處理錯誤」等無法驗收的表述。'
    - '每個 requirement／scenario 必須能追溯到一個或多個實作、測試或人工驗證任務；不得只列程式修改而省略驗收。'
    - '修改 parser、Citybus 參數、站點對齊或 ETA 時，加入可復現 cURL／fixture／回歸測試任務，並確認生產路徑仍使用真實 HTTP。'
    - '修改 UI、通知或背景服務時，加入模擬器／實機驗證任務，覆蓋主要狀態、生命週期、停止／恢復、無障礙及常見螢幕／字體條件。'
    - '加入針對性測試和回歸測試；最終 Android 實作驗證原則上包含 `./gradlew build`，無法執行時記錄原因和剩餘風險。'
    - '任務不得夾帶 proposal／design 未授權的重構或行為變更；發現必要範圍擴張時先更新對應工件再實作。'
    - '`/opsx-apply` 執行時按 tasks 順序工作並同步勾選；完成後檢查 `git status --short`、驗證結果和提交範圍，再依專案規則自動提交。'
